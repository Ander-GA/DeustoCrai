# Este flujo de trabajo construye el proyecto con Gradle y ejecuta todos los tests organizados por carpetas físicas
name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: deustocrai_db
          MYSQL_USER: spq
          MYSQL_PASSWORD: spq
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Aquí configuramos Gradle Y le decimos que genere los 3 checks
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        dependency-graph: generate-and-submit

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. Ejecución de Tests Unitarios (Carpeta src/test)
    - name: Run Unit Tests
      run: ./gradlew test

    # 2. Ejecución de Tests de Integración (Carpeta src/integrationTest)
    - name: Run Integration Tests
      run: ./gradlew integrationTest

    # 3. Ejecución de Tests de Rendimiento (Carpeta src/performanceTest)
    - name: Run Performance Tests
      run: ./gradlew performanceTest

    # 4. Generación del informe de cobertura (JaCoCo)
    - name: Generate Coverage Report
      run: ./gradlew jacocoTestReport

    # 5. Construcción del JAR final (solo si los tests pasan)
    - name: Build with Gradle
      run: ./gradlew build -x test -x integrationTest -x performanceTest
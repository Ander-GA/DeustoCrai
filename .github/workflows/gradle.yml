name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # -------- CAMBIO 1: Añadimos la base de datos MySQL temporal --------
    # Los servicios van aquí, antes de la palabra "steps:"
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: deustocrai_db
          MYSQL_USER: spq
          MYSQL_PASSWORD: spq
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    # ---------------------------------------------------------------------

    # Aquí empieza tu ÚNICO bloque de pasos
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    # -------- CAMBIO 2: Damos permisos de ejecución al Wrapper --------
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    # ------------------------------------------------------------------

    - name: Build with Gradle Wrapper
      run: ./gradlew build

  # Este es el segundo Job (El que da avisos de seguridad)
  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

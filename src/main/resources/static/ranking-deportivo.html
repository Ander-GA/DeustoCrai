<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking Deportivo - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ranking-container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: center; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: var(--azul-deusto); color: white; }
        tr:hover { background-color: #f1f1f1; }
        .top-1 { font-weight: bold; color: #d4af37; font-size: 1.1em; } /* Color oro para el primero */
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="ranking-container">
            <h2 style="text-align: center; color: var(--azul-deusto);">🏆 Clasificación Global - Pistas CRAI</h2>
            <p style="text-align: center; color: #666;">Los mejores jugadores según su porcentaje de victorias en las instalaciones.</p>
            
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Jugador</th>
                        <th>Partidos Jugados</th>
                        <th>Victorias</th>
                        <th>Derrotas</th>
                        <th>Puntos Totales</th>
                        <th>Win Rate (%)</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <tr><td colspan="7">Cargando estadísticas...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/deportes/stats/ranking');
                const ranking = await response.json();
                const tbody = document.getElementById('ranking-body');
                tbody.innerHTML = '';

                if(ranking.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7">Aún no hay partidos registrados.</td></tr>';
                    return;
                }

                ranking.forEach((stats, index) => {
                    const rowClass = index === 0 ? 'top-1' : '';
                    const medalla = index === 0 ? '🥇' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : index + 1));
                    
                    tbody.innerHTML += `
                        <tr class="${rowClass}">
                            <td>${medalla}</td>
                            <td>${stats.nombre}</td>
                            <td>${stats.partidosJugados}</td>
                            <td>${stats.victorias}</td>
                            <td>${stats.derrotas}</td>
                            <td>${stats.puntosAnotados}</td>
                            <td><strong>${stats.winRate}%</strong></td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar el ranking", error);
                document.getElementById('ranking-body').innerHTML = '<tr><td colspan="7" style="color:red;">Error de conexión.</td></tr>';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Bibliotecario - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columnas fijas para que sea horizontal */
            gap: 20px;
            margin-top: 30px;
        }
        .dashboard-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .dashboard-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-color: var(--azul-deusto);
        }
        .icon-box { font-size: 2.5rem; margin-bottom: 10px; }
        .dashboard-card h3 { color: #004b87; margin: 5px 0; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <h2>Panel de Gestión - Bibliotecario</h2>
        
        <div class="dashboard-grid">
            <a href="gestionar-prestamos.html?filtro=libros" class="dashboard-card">
                <div class="icon-box">📚</div>
                <h3>Préstamos (Libros)</h3>
            </a>
            <a href="gestionar-prestamos.html?filtro=materiales" class="dashboard-card">
                <div class="icon-box">💻</div>
                <h3>Préstamos (Material)</h3>
            </a>
            
            <a href="gestionar-libros.html" class="dashboard-card">
                <div class="icon-box">📖</div>
                <h3>Catálogo Libros</h3>
            </a>
            <a href="gestionar-salas.html" class="dashboard-card">
                <div class="icon-box">🏫</div>
                <h3>Gestión Salas</h3>
            </a>
            
            <a href="gestionar-pistas.html" class="dashboard-card">
                <div class="icon-box">⚽</div>
                <h3>Pistas Deportivas</h3>
            </a>

            <a href="estadisticas.html" class="dashboard-card">
                <div class="icon-box">📊</div>
                <h3>Estadísticas</h3>
            </a>
            <a href="penalizaciones.html" class="dashboard-card">
                <div class="icon-box">⚖️</div>
                <h3>Penalizaciones</h3>
            </a>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'login.html'; return; }
            
            try {
                const response = await fetch('/auth/me', { headers: { 'Authorization': token } });
                const user = await response.json();
                if (user.role !== 'BIBLIOTECARIO' && user.role !== 'ADMIN') {
                    alert("Acceso denegado.");
                    window.location.href = 'index.html';
                }
            } catch (e) { window.location.href = 'login.html'; }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container" style="margin-top: 40px; text-align: center;">
        <h2>Mi Perfil</h2>
        
        <div class="login-box" style="margin: 0 auto; text-align: left;">
            <p><strong>Nombre:</strong> <span id="perfil-nombre">Cargando...</span></p>
            <p><strong>Apellidos:</strong> <span id="perfil-apellidos">Cargando...</span></p>
            <p><strong>Email:</strong> <span id="perfil-email">Cargando...</span></p>
            <p><strong>Rol:</strong> <span id="perfil-rol">Cargando...</span></p>
            
            <button onclick="cerrarSesion()" class="btn-primary" style="margin-top: 20px; background-color: #d9534f;">Cerrar Sesión</button>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container" style="margin-top: 40px; text-align: center;">
        <h2>Mi Perfil</h2>
        
        <div class="login-box" style="margin: 0 auto; text-align: left;">
            <p><strong>Nombre:</strong> <span id="perfil-nombre">Cargando...</span></p>
            <p><strong>Apellidos:</strong> <span id="perfil-apellidos">Cargando...</span></p>
            <p><strong>Email:</strong> <span id="perfil-email">Cargando...</span></p>
            <p><strong>Rol:</strong> <span id="perfil-rol">Cargando...</span></p>
            
            <button onclick="cerrarSesion()" class="btn-primary" style="margin-top: 20px; background-color: #d9534f;">Cerrar Sesión</button>
        </div>
		
		<div class="card mt-4">
		    <div class="card-header bg-primary text-white">
		        <h5>Mis Estadísticas de Préstamos</h5>
		    </div>
		    <div class="card-body">
		        <div class="row text-center">
		            <div class="col-md-3">
		                <h3 id="stat-total">0</h3>
		                <p class="text-muted">Total Préstamos</p>
		            </div>
		            <div class="col-md-3">
		                <h3 id="stat-activos" class="text-primary">0</h3>
		                <p class="text-muted">Activos</p>
		            </div>
		            <div class="col-md-3">
		                <h3 id="stat-tiempo" class="text-success">0</h3>
		                <p class="text-muted">A tiempo</p>
		            </div>
		            <div class="col-md-3">
		                <h3 id="stat-retraso" class="text-danger">0</h3>
		                <p class="text-muted">Con retraso</p>
		            </div>
		        </div>
		    </div>
		</div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DeustoCrai - Gestión de Salas</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 15% auto; padding: 20px; border-radius: 5px; width: 400px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-bloquear { background-color: #d9534f; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .btn-confirm { background-color: #5cb85c; color: white; padding: 10px 15px; border: none; cursor: pointer; width: 100%; }
        .close-btn { float: right; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div id="header-container"></div> <div class="container" style="padding: 20px;">
        <h2>Gestión de Salas - Bloqueos de Mantenimiento</h2>
        <p>Selecciona una sala para restringir su reserva por motivos de limpieza o reformas.</p>

        <table class="table" id="tabla-salas" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="background-color: #f2f2f2; border-bottom: 2px solid #ddd;">
                    <th style="padding: 10px; text-align: left;">ID Sala</th>
                    <th style="padding: 10px; text-align: left;">Nombre / Código</th>
                    <th style="padding: 10px; text-align: left;">Capacidad</th>
                    <th style="padding: 10px; text-align: left;">Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-salas-body">
                </tbody>
        </table>
    </div>

    <div id="modalBloqueo" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <h3>Bloquear Sala: <span id="modal-nombre-sala"></span></h3>
            <form id="formBloqueo">
                <input type="hidden" id="bloqueo-aula-id">
                
                <div class="form-group">
                    <label for="fecha-inicio">Fecha y Hora de Inicio:</label>
                    <input type="datetime-local" id="fecha-inicio" required>
                </div>
                
                <div class="form-group">
                    <label for="fecha-fin">Fecha y Hora de Fin:</label>
                    <input type="datetime-local" id="fecha-fin" required>
                </div>
                
                <div class="form-group">
                    <label for="motivo-bloqueo">Motivo del Bloqueo:</label>
                    <select id="motivo-bloqueo" required>
                        <option value="Obras">Obras / Reformas</option>
                        <option value="Limpieza">Limpieza Profunda</option>
                        <option value="Mantenimiento Técnico">Mantenimiento Técnico</option>
                        <option value="Reservado Universidad">Uso Exclusivo Interno</option>
                    </select>
                </div>

                <button type="submit" class="btn-confirm">Confirmar y Aplicar Bloqueo</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/gestionar-salas.js"></script>
    <script>
        // Cargar el header común si tu proyecto lo utiliza así
        fetch('header.html')
            .then(response => response.text())
            .then(data => document.getElementById('header-container').innerHTML = data);
    </script>
</body>
</html>

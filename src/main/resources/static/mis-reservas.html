<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DeustoCrai - Mis Reservas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container" style="padding: 40px; max-width: 800px; margin: auto;">
        <h2 style="color: #003366;">Mis Reservas de Salas</h2>
        <hr>
        <div id="lista-reservas" style="margin-top: 20px;">
            <p>Cargando tus reservas...</p>
        </div>
        <br>
        <a href="index.html" class="btn-primary" style="text-decoration:none; display:inline-block; text-align:center;">Volver al Inicio</a>
    </main>

    <script src="js/auth.js"></script>
    <script>
       
		
		async function cargarReservas() {
		    const token = localStorage.getItem('token');
		    
		    // Si no hay token, pedimos inicio de sesión
		    if (!token) {
		        document.getElementById('lista-reservas').innerHTML = "<p>Inicia sesión para ver tus reservas.</p>";
		        return;
		    }

		    try {
		        // 1. Petición DIRECTA a las reservas usando el token en la cabecera
		        const response = await fetch('/api/salas/mis-reservas', {
		            headers: { 'Authorization': token }
		        });
		                        
		        // Si el servidor da error (Ej: 401 Unauthorized), forzamos login
		        if (!response.ok) {
		            localStorage.removeItem('token');
		            alert("Tu sesión ha caducado. Vuelve a iniciar sesión.");
		            window.location.href = "login.html";
		            return;
		        }

		        const reservas = await response.json();
		        const container = document.getElementById('lista-reservas');
		        
		        // Si la lista está vacía
		        if (reservas.length === 0) {
		            container.innerHTML = "<p>No tienes reservas realizadas.</p>";
		            return;
		        }

		        // 2. Pintar la lista de reservas
		        container.innerHTML = '';
		        reservas.forEach(r => {
		             // Convertimos directamente la fecha a un objeto Date (igual que en los libros)
		             let dateObj = new Date(r.fechaHoraInicio);						                    
		             let nombreSala = r.aula ? r.aula.nombre : "Sala eliminada/desconocida";
		                            
		             container.innerHTML += `
		               <div style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #003366; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
		                    <strong>Sala:</strong> ${nombreSala} <br>
		                    <strong>Fecha:</strong> ${dateObj.toLocaleDateString()} <br>
		                    <strong>Horario:</strong> ${dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
		               </div>`;
		        });
		    } catch (error) {
		        console.error("Error:", error);
		        document.getElementById('lista-reservas').innerHTML = "<p>Error al cargar las reservas. Verifica tu conexión.</p>";
		    }
		}
		
		
				document.addEventListener('DOMContentLoaded', () => {
				    setTimeout(cargarReservas, 500);
				});
    </script>
</body>
</html>

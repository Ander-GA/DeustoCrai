<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DeustoCrai - Mis Reservas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container" style="padding: 40px; max-width: 800px; margin: auto;">
        <h2 style="color: #003366;">Mis Reservas de Salas</h2>
        <hr>
        <div id="lista-reservas" style="margin-top: 20px;">
            <p>Cargando tus reservas...</p>
        </div>
        <br>
        <a href="index.html" class="btn-primary" style="text-decoration:none; display:inline-block; text-align:center;">Volver al Inicio</a>
    </main>

    <script src="js/auth.js"></script>
    <script>
        async function cargarReservas() {
            const token = localStorage.getItem('token');
            if (!token) return;

            try {
                const response = await fetch('/api/salas/mis-reservas', {
                    headers: { 'Authorization': token }
                });
                                
                if (!response.ok) throw new Error("Error del servidor");

                const reservas = await response.json();
                const container = document.getElementById('lista-reservas');
                
                if (reservas.length === 0) {
                    container.innerHTML = "<p>No tienes reservas realizadas.</p>";
                    return;
                }

                container.innerHTML = ''; 

                reservas.forEach(r => {
                    const fInicio = r.fechaHoraInicio;
                    const fFin = r.fechaHoraFin;
                    
                    const start = Array.isArray(fInicio) 
                        ? new Date(fInicio[0], fInicio[1]-1, fInicio[2], fInicio[3], fInicio[4]||0) 
                        : new Date(fInicio);
                    
                    const end = Array.isArray(fFin) 
                        ? new Date(fFin[0], fFin[1]-1, fFin[2], fFin[3], fFin[4]||0) 
                        : new Date(fFin);

                    const nombreSala = r.aula ? r.aula.nombre : "Sala desconocida";
                    
                    // --- LÓGICA CORREGIDA ---
                    const ahora = new Date();
                    // El botón estará azul si la reserva aún no ha terminado (independientemente de si ha empezado)
                    const puedeDevolver = ahora < end;

                    const estiloDevolver = puedeDevolver
                        ? "background: #003366; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;"
                        : "background: #e0e0e0; color: #a0a0a0; border: 1px solid #ccc; padding: 8px 12px; border-radius: 4px; cursor: not-allowed;";

                    container.innerHTML += `
                        <div style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #003366; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                            <strong style="font-size: 1.1em; color: #003366;">${nombreSala}</strong><br>
                            <strong>Fecha:</strong> ${start.toLocaleDateString()} <br>
                            <strong>Horario:</strong> ${start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} - ${end.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                            
                            <div style="display: flex; gap: 10px; margin-top: 15px;">
                                <button onclick="extenderReserva(${r.id})" style="background: #003366; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;">+30 min</button>
                                
                                <button onclick="devolverSala(${r.id})" ${puedeDevolver ? '' : 'disabled'} style="${estiloDevolver}">
                                    Devolver Sala
                                </button>

                                <button onclick="cancelarReserva(${r.id})" style="background: #d9534f; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;">Cancelar</button>
                            </div>
                        </div>`;
                });
            } catch (error) {
                document.getElementById('lista-reservas').innerHTML = "<p>Error al cargar las reservas.</p>";
            }
        }

        async function devolverSala(id) {
            if (!confirm("¿Deseas liberar la sala ahora?")) return;
            const token = localStorage.getItem('token');
            const response = await fetch(`/api/reservas/${id}/devolver`, {
                method: 'PUT',
                headers: { 'Authorization': token }
            });
            if (response.ok) { alert("Sala devuelta."); cargarReservas(); }
        }

        async function extenderReserva(id) {
            const token = localStorage.getItem('token');
            const response = await fetch(`/api/reservas/${id}/extender?minutos=30`, {
                method: 'PUT',
                headers: { 'Authorization': token }
            });
            if (response.ok) { alert("Extendida 30 min."); cargarReservas(); }
            else { alert("No se puede extender: sala ocupada."); }
        }

        async function cancelarReserva(id) {
            if (!confirm("¿Cancelar reserva?")) return;
            const token = localStorage.getItem('token');
            const response = await fetch(`/api/reservas/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': token }
            });
            if (response.ok) { alert("Cancelada."); cargarReservas(); }
        }

        document.addEventListener('DOMContentLoaded', () => setTimeout(cargarReservas, 400));
    </script>
</body>
</html>

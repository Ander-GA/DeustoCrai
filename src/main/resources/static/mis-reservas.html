<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DeustoCrai - Mis Reservas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container" style="padding: 40px; max-width: 800px; margin: auto;">
        <h2 style="color: #003366;">Mis Reservas de Salas</h2>
        <hr>
        <div id="lista-reservas" style="margin-top: 20px;">
            <p>Cargando tus reservas...</p>
        </div>
        <br>
        <a href="index.html" class="btn-primary" style="text-decoration:none; display:inline-block; text-align:center;">Volver al Inicio</a>
    </main>

    <script src="js/auth.js"></script>
    <script>
       
		
		async function cargarReservas() {
		            const token = localStorage.getItem('token');
		            if (!token) return;

		            try {
		                // 1. Obtener datos del usuario logueado
		                const userResp = await fetch('/auth/me', { headers: { 'Authorization': token } });
		                const user = await userResp.json();

		                // Si la sesión caducó o el usuario no tiene ID (caché antigua), forzamos login
		                if (!userResp.ok || !user.id) {
		                    localStorage.removeItem('token');
		                    alert("Tu sesión necesita actualizarse. Por favor, vuelve a iniciar sesión.");
		                    window.location.href = "login.html";
		                    return;
		                }

						// 2. Llamar al endpoint (AÑADIENDO EL TOKEN)
						const response = await fetch(`/api/salas/usuario/${user.id}`, {
						headers: { 'Authorization': token }
						});
						                
						// Si el servidor falla, lanzamos el error antes de romper el JSON
						if (!response.ok) throw new Error("Error del servidor");

		                const reservas = await response.json();
		                const container = document.getElementById('lista-reservas');
		                
		                if (reservas.length === 0) {
		                    container.innerHTML = "<p>No tienes reservas realizadas.</p>";
		                    return;
		                }

						// 3. Mostrar la lista con protección contra nulos
						 container.innerHTML = reservas.map(r => {
						     let f = r.fechaHoraInicio;
						     if (!f) return ''; // Si la reserva no tiene fecha (corrupta), la ignora
						                    
						     let dateObj = Array.isArray(f) ? new Date(f[0], f[1]-1, f[2], f[3], f[4]||0) : new Date(f);
						                    
						     // Protegemos por si se guardó una reserva sin aula en las pruebas
						     let nombreSala = r.aula ? r.aula.nombre : "Sala eliminada/desconocida";
						                    
						     return `
						       <div style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #003366; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
						            <strong>Sala:</strong> ${nombreSala} <br>
						            <strong>Fecha:</strong> ${dateObj.toLocaleDateString()} <br>
						            <strong>Horario:</strong> ${dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
						       </div>`;
						}).join('');
		            } catch (error) {
		                console.error("Error:", error);
		                document.getElementById('lista-reservas').innerHTML = "<p>Error al cargar las reservas.</p>";
		            }
		        }
		
		
        // Esperar a que cargue el header inyectado por auth.js
        window.onload = () => setTimeout(cargarReservas, 500);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Préstamos - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tabla-prestamos { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .tabla-prestamos th, .tabla-prestamos td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .tabla-prestamos th { background-color: #004b87; color: white; }
        .estado-pendiente { color: #d9534f; font-weight: bold; }
        .estado-entregado { color: #f0ad4e; font-weight: bold; }
        .estado-devuelto { color: #5cb85c; font-weight: bold; }
        .btn-accion { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; color: white; margin: 2px;}
        .btn-entregar { background-color: #f0ad4e; }
        .btn-devolver { background-color: #5cb85c; }
        .btn-volver { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #004b87; font-weight: bold;}
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <a href="panel-bibliotecario.html" class="btn-volver">← Volver al Panel</a>
        <h2>Gestión de Préstamos</h2>
        
        <table class="tabla-prestamos">
            <thead>
                <tr>
                    <th>Usuario (Email)</th>
                    <th>Recurso</th>
                    <th>Fecha Inicio</th>
                    <th>Fecha Fin Prevista</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody-prestamos">
                <tr><td colspan="6">Cargando préstamos...</td></tr>
            </tbody>
        </table>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/gestionar-prestamos.js"></script>
</body>
</html>

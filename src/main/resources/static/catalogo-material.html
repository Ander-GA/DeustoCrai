<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Material - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .material-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #ddd; }
        .disponible { color: #28a745; font-weight: bold; }
        .no-disponible { color: #dc3545; font-weight: bold; }
        .btn-prestar { background-color: var(--azul-deusto); color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container">
        <h2>Catálogo de Material Técnico</h2>
        <p>Reserva portátiles, cámaras y otros dispositivos para tu estudio.</p>
        <hr style="margin-bottom: 20px;">
        
        <div id="lista-materiales">
            <p style="text-align: center;">Cargando materiales...</p>
        </div>

        <div id="seccion-valoraciones" style="display: none; margin-top: 30px; padding: 20px; background-color: #f1f4f8; border-radius: 8px;">
            <h3 id="titulo-resenas">Valoraciones del material</h3>
            <div id="lista-resenas" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px; background: white; padding: 10px;"></div>
            <hr>
            <h4>Deja tu opinión</h4>
            <form id="form-resena" onsubmit="enviarResena(event)">
                <input type="hidden" id="resena-recurso-id">
                Puntuación (1-5): <input type="number" id="resena-puntuacion" min="1" max="5" required style="width: 50px; margin-bottom: 10px;"><br>
                Comentario: <textarea id="resena-comentario" rows="2" style="width: 100%; margin-bottom: 10px;"></textarea><br>
                <button type="submit" class="btn-prestar" style="background-color: #28a745;">Publicar Reseña</button>
            </form>
        </div>
        </main>

<script src="js/auth.js"></script>

    <script>
        async function cargarMateriales() {
            try {
                const response = await fetch('/api/materiales');
                const materiales = await response.json();
                const lista = document.getElementById('lista-materiales');
                
                if (materiales.length === 0) {
                    lista.innerHTML = '<p>No hay material disponible actualmente.</p>';
                    return;
                }

                lista.innerHTML = ''; 
                materiales.forEach(m => {
                    const estado = m.disponible 
                        ? '<span class="disponible">✔ Disponible</span>' 
                        : '<span class="no-disponible">✖ En préstamo</span>';
                    
                    const btnAccion = m.disponible 
                        ? `<button class="btn-prestar" onclick="prestarMaterial(${m.id})">Reservar</button>` 
                        : `<button disabled style="background:#ccc; cursor:not-allowed;">No disponible</button>`;

                    lista.innerHTML += `
                        <div class="material-item">
                            <div>
                                <a href="detalle-material.html?id=${m.id}"><strong>${m.titulo}</strong></a><br>
                                <small>Tipo: ${m.tipo} | S/N: ${m.numeroSerie}</small><br>
                                <button onclick="cargarResenas(${m.id}, '${m.titulo.replace(/'/g, "\\'")}')" style="margin-top: 5px; cursor: pointer; padding: 3px 8px; font-size: 0.85em; border: 1px solid #ccc; border-radius: 4px; background: #f9f9f9;">★ Ver Reseñas</button>
                                <div style="margin-top:5px;">${estado}</div>
                            </div>
                            <div>${btnAccion}</div>
                        </div>`;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('lista-materiales').innerHTML = '<p>Error al conectar con el servidor.</p>';
            }
        }

        // --- FUNCIÓN CORREGIDA APUNTANDO A LA RUTA EXACTA DEL CONTROLADOR ---
        async function prestarMaterial(materialId) {
            const token = localStorage.getItem('token');
            
            if (!token) {
                alert('Debes iniciar sesión para reservar material.');
                window.location.href = 'login.html';
                return;
            }

            try {
                // Aquí está el cambio clave: apuntamos al endpoint específico de material
                const response = await fetch(`/api/prestamos/prestar-material/${materialId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': token 
                    }
                });

                if (response.ok) {
                    alert('¡Material reservado con éxito!');
                    cargarMateriales(); 
                } else if (response.status === 401) {
                    alert('Sesión expirada. Vuelve a iniciar sesión.');
                    window.location.href = 'login.html';
                } else {
                    const errorMsg = await response.text();
                    alert('Error al reservar: ' + errorMsg);
                }
            } catch (e) {
                console.error('Error en la petición:', e);
                alert('Error de conexión con el servidor.');
            }
        }

        //NUEVAS FUNCIONES AÑADIDAS: CARGAR Y ENVIAR RESEÑAS
        async function cargarResenas(recursoId, tituloRecurso) {
            document.getElementById('seccion-valoraciones').style.display = 'block';
            document.getElementById('titulo-resenas').innerText = "Valoraciones de: " + tituloRecurso;
            document.getElementById('resena-recurso-id').value = recursoId;
            const lista = document.getElementById('lista-resenas');
            lista.innerHTML = 'Cargando...';

            try {
                const response = await fetch(`/api/valoraciones/recurso/${recursoId}`);
                if (response.ok) {
                    const resenas = await response.json();
                    if (resenas.length === 0) {
                        lista.innerHTML = '<p>Este material aún no tiene valoraciones.</p>';
                    } else {
                        lista.innerHTML = resenas.map(r => 
                            `<div style="border-bottom: 1px solid #ccc; padding: 5px 0;">
                                <strong>${r.usuario.nombre}</strong> (⭐${r.puntuacion}): <em>${r.comentario || ''}</em>
                            </div>`
                        ).join('');
                    }
                }
            } catch (e) { lista.innerHTML = 'Error al cargar reseñas.'; }
            
            document.getElementById('seccion-valoraciones').scrollIntoView({ behavior: 'smooth' });
        }

        async function enviarResena(event) {
            event.preventDefault();
            const recursoId = document.getElementById('resena-recurso-id').value;
            const puntuacion = document.getElementById('resena-puntuacion').value;
            const comentario = document.getElementById('resena-comentario').value;
            const token = localStorage.getItem('token');

            if (!token) return alert("Inicia sesión para valorar.");

            try {
                const url = `/api/valoraciones/recurso/${recursoId}?puntuacion=${puntuacion}&comentario=${encodeURIComponent(comentario)}`;
                const response = await fetch(url, { method: 'POST', headers: { 'Authorization': token } });

                if (response.ok) {
                    alert("¡Valoración guardada!");
                    document.getElementById('form-resena').reset();
                    cargarResenas(recursoId, document.getElementById('titulo-resenas').innerText.replace('Valoraciones de: ', ''));
                } else {
                    const err = await response.json();
                    alert("Error: " + (err.error || "No se pudo guardar."));
                }
            } catch (e) { alert("Error de conexión."); }
        }

        window.onload = () => {
            if (typeof init === "function") {
                init(); 
            }
            setTimeout(cargarMateriales, 300);
        };
    </script>
</body>
</html>

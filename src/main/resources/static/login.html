<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificarse - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="login-section">
        <div class="login-box">
            <h2>Identificarse</h2>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                
                <button type="button" onclick="login()" class="btn-primary">Entrar</button>
            </form>
            <p id="error-message" class="error-msg" style="display: none;">Error, compruebe sus credenciales.</p>
        </div>
    </main>

    <script src="js/auth.js"></script>
    
    <script>
        async function login() {
            // 1. Recoger los valores que el usuario ha escrito
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Ocultamos el mensaje de error por si estaba visible de un intento anterior
            errorMessage.style.display = 'none';

            // Validar que los campos no estén vacíos
            if(!emailInput || !passwordInput) {
                errorMessage.innerText = "Por favor, rellene todos los campos.";
                errorMessage.style.display = 'block';
                return;
            }

            try {
                // 2. Enviar los datos a tu backend de Spring Boot (AuthController)
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: emailInput, password: passwordInput })
                });

                // 3. Comprobar la respuesta
                if (response.ok) {
                    // Si el login es correcto, guardamos el token que nos devuelve el servidor
                    const token = await response.text(); 
                    localStorage.setItem('token', token);
                    
                    // Redirigimos a la página principal
                    window.location.href = 'index.html';
                } else {
                    // Si el servidor devuelve un error (credenciales incorrectas), mostramos el mensaje
                    errorMessage.innerText = "Error, compruebe sus credenciales.";
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error("Error al conectar con el servidor:", error);
                errorMessage.innerText = "Error de conexión con el servidor.";
                errorMessage.style.display = 'block';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Libros - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .libro-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .libro-item:last-child {
            border-bottom: none;
        }

        .disponible {
            color: #28a745;
            font-weight: bold;
        }

        .no-disponible {
            color: #dc3545;
            font-weight: bold;
        }

        .btn-accion {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn-prestar {
            background-color: var(--azul-deusto);
        }

        .btn-prestar:hover {
            background-color: #002244;
        }

        .btn-cola {
            background-color: var(--naranja-deusto) !important;
            color: white !important;
            cursor: pointer !important;
            opacity: 1 !important;
        }

        .btn-cola:hover {
            background-color: #e68a00 !important;
        }
    </style>
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="container">

        <h2>Catálogo de Libros</h2>

        <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">

        <div id="lista-libros">
            <p style="text-align: center; color: #666;">
                Cargando catálogo...
            </p>
        </div>

    </main>

    <script src="js/auth.js"></script>

    <script>

        async function cargarLibros() {

            try {

                const urlParams = new URLSearchParams(window.location.search);
                const query = urlParams.get('buscar');

                const endpoint = query
                    ? `/api/libros/buscar?q=${query}`
                    : '/api/libros';

                const response = await fetch(endpoint);

                const libros = await response.json();

                const lista = document.getElementById('lista-libros');

                if (libros.length === 0) {

                    lista.innerHTML = `
                        <p style="text-align: center; margin-top: 20px;">
                            No se han encontrado libros
                            ${query ? 'para la búsqueda "' + query + '"' : 'en el catálogo'}.
                        </p>
                    `;

                    return;
                }

                lista.innerHTML = '';

                libros.forEach(libro => {

                    const estado = libro.disponible
                        ? '<span class="disponible">✔ Disponible</span>'
                        : '<span class="no-disponible">✖ En préstamo</span>';

                    const btnPrestar = libro.disponible
                        ? `<button class="btn-accion btn-prestar"
                            onclick="prestarLibro(${libro.id})">
                            Reservar Libro
                           </button>`
                        : `<button class="btn-accion btn-cola"
                            onclick="apuntarseCola(${libro.id})">
                            Apuntarme a la cola
                           </button>`;

                    lista.innerHTML += `
                        <div class="libro-item">

                            <div>

                                <a href="detalle-libro.html?id=${libro.id}"
                                   style="font-size: 1.1rem;
                                          color: var(--azul-deusto);
                                          text-decoration: none;">

                                    <strong>${libro.titulo}</strong>

                                </a>

                                <br>

                                <span style="color: #666; font-size: 0.9rem;">
                                    ISBN: ${libro.isbn}
                                </span>

                                <br>

                                <em>Autor: ${libro.autor}</em>

                                <br>

                                <div style="margin-top: 5px;">
                                    Estado: ${estado}
                                </div>

                            </div>

                            <div>
                                ${btnPrestar}
                            </div>

                        </div>
                    `;
                });

            } catch (e) {

                console.error("Error al cargar catálogo:", e);

                document.getElementById('lista-libros').innerHTML =
                    '<p style="color: red; text-align: center;">Error al conectar con el servidor.</p>';
            }
        }


        async function prestarLibro(id) {

            const token = localStorage.getItem('token');

            if (!token) {

                alert("Debes iniciar sesión primero para poder reservar un libro.");

                window.location.href = "login.html";

                return;
            }

            try {

                const response = await fetch(`/api/prestamos/prestar/${id}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': token
                    }
                });

                if (response.ok) {

                    alert("¡Libro reservado con éxito! Puedes gestionarlo desde 'Mis Préstamos'.");

                    cargarLibros();

                } else if (response.status === 401 || response.status === 403) {

                    alert("Tu sesión ha caducado. Vuelve a iniciar sesión.");

                    window.location.href = "login.html";

                } else {

                    const error = await response.text();

                    alert("Error:\n" + error);
                }

            } catch (e) {

                console.error("Error en la reserva:", e);
            }
        }


        async function apuntarseCola(id) {

            const token = localStorage.getItem('token');

            if (!token) {

                alert("Debes iniciar sesión primero para apuntarte a la cola.");

                window.location.href = "login.html";

                return;
            }

            try {

                const response = await fetch(`/api/cola-espera/recurso/${id}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Token-Auth': token
                    }
                });

                if (response.ok) {

                    const cola = await response.json();

                    const posicionResponse = await fetch(
                        `/api/cola-espera/recurso/${id}/posicion`,
                        {
                            headers: {
                                'Authorization': token,
                                'Token-Auth': token
                            }
                        }
                    );

                    const posicion = await posicionResponse.json();

                    alert(
                        "✅ Te has apuntado correctamente a la cola.\n\n" +
                        "📚 Recurso: " + cola.recurso.titulo + "\n" +
                        "📍 Posición en cola: " + posicion
                    );

                    cargarLibros();

                } else {

                    const error = await response.text();

                    alert("No se ha podido apuntar a la cola:\n" + error);
                }

            } catch (e) {

                console.error("Error al apuntarse a la cola:", e);

                alert("Error al conectar con el servidor.");
            }
        }


        window.addEventListener('load', () => {
            setTimeout(cargarLibros, 300);
        });

    </script>

</body>
</html>

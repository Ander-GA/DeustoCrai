<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Préstamos - DeustoCrai</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .prestamo-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #ddd; }
        .btn-devolver { padding: 8px 15px; background-color: var(--naranja-deusto); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container">
        <h2>Mis Préstamos Activos</h2>
        <div id="lista-prestamos">Cargando...</div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        async function cargarMisPrestamos() {
            const token = localStorage.getItem('token');
            if (!token) {
                document.getElementById('lista-prestamos').innerHTML = "<p>Inicia sesión para ver tus préstamos.</p>";
                return;
            }

            try {
                const response = await fetch('/api/prestamos/mis-prestamos', {
                    headers: { 'Authorization': token }
                });
                
                if (!response.ok) throw new Error("Error en sesión");
                
                const prestamos = await response.json();
                const lista = document.getElementById('lista-prestamos');
                
                if (prestamos.length === 0) {
                    lista.innerHTML = "<p>No tienes ningún préstamo activo.</p>";
                    return;
                }

                lista.innerHTML = '';
                prestamos.forEach(p => {
                    lista.innerHTML += `
                        <div class="prestamo-item">
                            <div>
                                <strong>${p.recurso.titulo}</strong><br>
                                Fecha de préstamo: ${p.fechaPrestamo}<br>
                                Devolución prevista: ${p.fechaDevolucionPrevista}
                            </div>
                            <button class="btn-devolver" onclick="devolverLibro(${p.id})">Devolver Recurso</button>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function devolverLibro(prestamoId) {
            const token = localStorage.getItem('token');
            const response = await fetch(`/api/prestamos/devolver/${prestamoId}`, {
                method: 'POST',
                headers: { 'Authorization': token }
            });
            
            if (response.ok) {
                alert("¡Recurso devuelto correctamente!");
                cargarMisPrestamos();
            } else {
                alert("Error al devolver el recurso.");
            }
        }

        window.addEventListener('load', () => setTimeout(cargarMisPrestamos, 300));
    </script>
</body>
</html>

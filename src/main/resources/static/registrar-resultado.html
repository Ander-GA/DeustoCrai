<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Resultado Deportivo - DeustoCrai</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Contenedor principal del formulario */
        .form-container { 
            max-width: 600px; 
            margin: 50px auto; 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.15); 
        }

        /* Estilos de las etiquetas (labels) */
        label { 
            font-weight: bold; 
            margin-top: 20px; 
            display: block; 
            color: #2c3e50; 
            font-size: 1.05rem;
        }

        /* Campos de texto y numéricos */
        input[type="number"], 
        input[type="text"], 
        textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border: 1px solid #bdc3c7; 
            border-radius: 6px; 
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
        }

        /* Contenedor flexible para los marcadores */
        .score-container { 
            display: flex; 
            justify-content: space-between;
            gap: 20px; 
            margin-top: 10px;
        }

        .score-container > div {
            flex: 1;
        }
        
        /* Controles para seleccionar el deporte */
        .sport-selector { 
            display: flex; 
            gap: 15px; 
            margin-top: 15px; 
            margin-bottom: 25px;
        }

        /* Estilo base de los botones de deporte */
        .btn-sport { 
            flex: 1; 
            padding: 15px; 
            border: 2px solid #bdc3c7; 
            background: #f8f9fa; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1rem;
            transition: all 0.3s ease; 
        }

        /* Estados activos para Fútbol y Pádel */
        .btn-sport.active-futbol { 
            border-color: #27ae60; 
            background: #eafaf1; 
            color: #27ae60; 
            transform: scale(1.02);
        }
        
        .btn-sport.active-padel { 
            border-color: #3498db; 
            background: #ebf5fb; 
            color: #3498db; 
            transform: scale(1.02);
        }

        /* Manejo de visibilidad de los paneles dinámicos */
        .seccion-dinamica { 
            display: none; 
            margin-top: 25px; 
            padding: 20px; 
            background: #fdfdfd; 
            border-radius: 8px; 
            border-left: 5px solid #333; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }
        
        .mostrar { 
            display: block; 
            animation: fadeIn 0.4s ease-in-out;
        }

        /* Animación suave al cambiar de deporte */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Botón final de enviar */
        .btn-enviar {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }
        
        .btn-enviar:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="form-container">
            <h2 style="text-align: center; color: #2c3e50;">📝 Registro de Resultados</h2>
            <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">
                Introduce los resultados de tu reserva deportiva para actualizar el ranking del CRAI.
            </p>
            
            <form id="form-resultado">
                
                <div class="form-group">
                    <label for="reservaId">Identificador de la Reserva:</label>
                    <input type="number" id="reservaId" placeholder="Ejemplo: 105" required>
                </div>

                <div class="form-group">
                    <label>Selecciona la modalidad deportiva jugada:</label>
                    <div class="sport-selector">
                        <button type="button" class="btn-sport" id="btnFutbol" onclick="manejarClickDeporte('FUTBOL')">⚽ Fútbol Sala</button>
                        <button type="button" class="btn-sport" id="btnPadel" onclick="manejarClickDeporte('PADEL')">🎾 Pádel</button>
                    </div>
                </div>

                <div id="seccion-futbol" class="seccion-dinamica" style="border-left-color: #27ae60;">
                    <h3 style="margin-top:0; color:#27ae60; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
                        Marcador de Fútbol Sala
                    </h3>
                    <div class="score-container">
                        <div>
                            <label for="golesLocal">Goles de tu equipo (Local):</label>
                            <input type="number" id="golesLocal" min="0" value="0">
                        </div>
                        <div>
                            <label for="golesVisitante">Goles del rival (Visitante):</label>
                            <input type="number" id="golesVisitante" min="0" value="0">
                        </div>
                    </div>
                </div>

                <div id="seccion-padel" class="seccion-dinamica" style="border-left-color: #3498db;">
                    <h3 style="margin-top:0; color:#3498db; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
                        Marcador de Pádel
                    </h3>
                    <div class="score-container">
                        <div>
                            <label for="setsLocal">Sets Ganados (Local):</label>
                            <input type="number" id="setsLocal" min="0" max="3" value="0">
                        </div>
                        <div>
                            <label for="setsVisitante">Sets Ganados (Visitante):</label>
                            <input type="number" id="setsVisitante" min="0" max="3" value="0">
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top: 15px;">
                        <label for="detallePadel">Desglose de Juegos (Opcional):</label>
                        <input type="text" id="detallePadel" placeholder="Ejemplo: 6-4, 3-6, 7-5">
                        <small style="color: #7f8c8d; display: block; margin-top: 5px;">
                            Introduce el resultado exacto de los juegos separados por comas.
                        </small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comentarios">Observaciones y Comentarios (Opcional):</label>
                    <textarea id="comentarios" rows="4" placeholder="¿Ocurrió algo destacable en el partido? Escríbelo aquí..."></textarea>
                </div>

                <button type="submit" class="btn-enviar" id="btnSubmitResultado">Guardar Resultado en el Sistema</button>
            </form>
        </div>
    </main>

    <script src="js/auth.js"></script>
    
    <script>
        // Variable global para almacenar el estado del formulario
        let deporteActualmenteSeleccionado = '';

        /**
         * Función que se ejecuta al hacer clic en los botones de selección de deporte.
         * Cambia las clases CSS para mostrar u ocultar paneles.
         */
        function manejarClickDeporte(deporte) {
            console.log("[DEBUG] Deporte seleccionado por el usuario: " + deporte);
            deporteActualmenteSeleccionado = deporte;
            
            // 1. Resetear el estado visual de los botones
            limpiarEstadoBotones();
            
            // 2. Ocultar todos los paneles dinámicos
            ocultarPanelesDinamicos();

            // 3. Activar el panel correspondiente según la elección
            if(deporte === 'FUTBOL') {
                activarPanelFutbol();
            } else if(deporte === 'PADEL') {
                activarPanelPadel();
            }
        }

        // --- FUNCIONES AUXILIARES DE INTERFAZ ---

        function limpiarEstadoBotones() {
            document.getElementById('btnFutbol').classList.remove('active-futbol');
            document.getElementById('btnPadel').classList.remove('active-padel');
        }

        function ocultarPanelesDinamicos() {
            document.getElementById('seccion-futbol').classList.remove('mostrar');
            document.getElementById('seccion-padel').classList.remove('mostrar');
        }

        function activarPanelFutbol() {
            document.getElementById('btnFutbol').classList.add('active-futbol');
            document.getElementById('seccion-futbol').classList.add('mostrar');
        }

        function activarPanelPadel() {
            document.getElementById('btnPadel').classList.add('active-padel');
            document.getElementById('seccion-padel').classList.add('mostrar');
        }

        // --- LÓGICA DE PROCESAMIENTO Y ENVÍO DE DATOS ---

        /**
         * Event Listener principal para el formulario.
         * Intercepta el evento submit para procesarlo por AJAX.
         */
        document.getElementById('form-resultado').addEventListener('submit', async function(event) {
            // Evitamos que la página se recargue por defecto
            event.preventDefault();
            console.log("[DEBUG] Iniciando proceso de guardado de resultado...");

            // Paso 1: Validar seguridad (Token JWT)
            const tokenGuardado = obtenerTokenDeSeguridad();
            if (!tokenGuardado) { 
                alert("Error de autenticación: Es necesario iniciar sesión en el CRAI."); 
                return; 
            }

            // Paso 2: Validar selección de deporte
            if (!validarDeporteSeleccionado()) {
                return; // Cortamos la ejecución si no ha elegido deporte
            }

            // Paso 3: Construir el objeto JSON para enviar a Spring Boot
            const cargaUtil = construirPayloadJSON();
            console.log("[DEBUG] Payload preparado para enviar:", cargaUtil);

            // Paso 4: Enviar petición HTTP al Backend
            await enviarDatosAlServidor(cargaUtil, tokenGuardado);
        });

        function obtenerTokenDeSeguridad() {
            return localStorage.getItem('token');
        }

        function validarDeporteSeleccionado() {
            if (deporteActualmenteSeleccionado === '') {
                alert("Validación fallida: Por favor, selecciona si jugaste al Fútbol o al Pádel.");
                return false;
            }
            return true;
        }

        /**
         * Recolecta los datos de los inputs correctos dependiendo del deporte.
         */
        function construirPayloadJSON() {
            let puntuacionLocal = 0;
            let puntuacionVisitante = 0;
            let detallesExtra = "";

            if (deporteActualmenteSeleccionado === 'FUTBOL') {
                puntuacionLocal = document.getElementById('golesLocal').value;
                puntuacionVisitante = document.getElementById('golesVisitante').value;
                console.log(`[DEBUG] Recogiendo datos FUTBOL -> Local: ${puntuacionLocal}, Visitante: ${puntuacionVisitante}`);
            } else if (deporteActualmenteSeleccionado === 'PADEL') {
                puntuacionLocal = document.getElementById('setsLocal').value;
                puntuacionVisitante = document.getElementById('setsVisitante').value;
                detallesExtra = document.getElementById('detallePadel').value;
                console.log(`[DEBUG] Recogiendo datos PADEL -> Sets: ${puntuacionLocal}-${puntuacionVisitante}, Detalle: ${detallesExtra}`);
            }

            // Formatear el objeto final como lo espera el Backend (ResultadoPartido.java)
            const objetoJSON = {
                reserva: { 
                    id: document.getElementById('reservaId').value 
                },
                deporte: deporteActualmenteSeleccionado,
                puntosLocal: parseInt(puntuacionLocal, 10),
                puntosVisitante: parseInt(puntuacionVisitante, 10),
                detalleResultado: detallesExtra,
                comentarios: document.getElementById('comentarios').value
            };

            return objetoJSON;
        }

        /**
         * Realiza la llamada fetch al controlador REST de Spring Boot.
         */
        async function enviarDatosAlServidor(payload, token) {
            try {
                // Deshabilitar botón para evitar dobles envíos
                document.getElementById('btnSubmitResultado').disabled = true;
                document.getElementById('btnSubmitResultado').innerText = "Guardando...";

                const respuestaHTTP = await fetch('/api/deportes/stats/registrar', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': token 
                    },
                    body: JSON.stringify(payload)
                });

                const mensajeServidor = await respuestaHTTP.text();
                console.log("[DEBUG] Respuesta del servidor recibida con status: " + respuestaHTTP.status);

                // Procesar la respuesta
                if (respuestaHTTP.ok) {
                    alert("¡Éxito! " + mensajeServidor);
                    // Redirigir a la vista de ranking para ver los resultados
                    window.location.href = 'ranking-deportivo.html';
                } else {
                    alert("Error al registrar: " + mensajeServidor);
                    // Reactivar botón en caso de error
                    document.getElementById('btnSubmitResultado').disabled = false;
                    document.getElementById('btnSubmitResultado').innerText = "Guardar Resultado en el Sistema";
                }

            } catch (excepcion) {
                console.error("[ERROR] Fallo de conexión o del servidor:", excepcion);
                alert("Fallo crítico de conexión al servidor del CRAI.");
                
                // Reactivar botón en caso de excepción
                document.getElementById('btnSubmitResultado').disabled = false;
                document.getElementById('btnSubmitResultado').innerText = "Guardar Resultado en el Sistema";
            }
        }
    </script>
</body>
</html>

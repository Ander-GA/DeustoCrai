<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeustoCrai - Búsqueda</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="hero-section">
        <div class="hero-content">
            <h1>Búsqueda en DeustoCrai</h1>
            <p>Descubre libros, revistas, artículos, reserva de salas y más...</p>

            <form class="search-box" action="#" method="GET">
                <select class="search-scope" name="scope">
                    <option value="todo">Todo</option>
                    <option value="catalogo">Catálogo</option>
                </select>
                <input type="text" placeholder="Buscar en el catálogo de la biblioteca..." aria-label="Buscar" required>
                <button type="submit" aria-label="Buscar">
                    <i class="fas fa-search"></i>
                </button>
            </form>

            <div class="quick-links" id="quick-links" style="display: none;">
                <a href="salas.html" class="quick-link-btn"><i class="far fa-calendar-alt"></i> Mis Reservas</a>
                <a href="mis-prestamos.html" class="quick-link-btn"><i class="fas fa-book-reader"></i> Mis Préstamos</a>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>

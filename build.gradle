plugins {
	id 'java'
	id 'org.springframework.boot' version '3.4.0'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'es.deusto.spq.deustocrai'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    
    runtimeOnly 'com.mysql:mysql-connector-j'
    
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.hamcrest:hamcrest:2.2'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.5'
}

tasks.named('test') {
	useJUnitPlatform()
	// Tarea para ejecutar SOLO los tests unitarios
task testUnitario(type: Test) {
    useJUnitPlatform {
        includeTags 'Unitario'
    }
    testLogging {
        events "passed", "skipped", "failed"
    }
}

// Tarea para ejecutar SOLO los tests de integración
task testIntegracion(type: Test) {
    useJUnitPlatform {
        includeTags 'Integracion'
    }
    testLogging {
        events "passed", "skipped", "failed"
    }
}

// Tarea para ejecutar SOLO los tests de rendimiento
task testRendimiento(type: Test) {
    useJUnitPlatform {
        includeTags 'Rendimiento'
    }
    testLogging {
        events "passed", "skipped", "failed"
    }
}
}
